version: "3.9"

services:
  freetalk_backend:
    build: ./backend
    container_name: freetalk_backend
    restart: always
    ports:
      - "8002:8002"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6381:6379"
    volumes:
      - redis_data_freetalk:/data

volumes:
  redis_data_freetalk: